    <style>
        :root {
            --bg: #070b14;
            --text: #e7ecf6;
            --text-dim: #93a0b8;
            --text-faint: #6b7893;
            --primary: #4a86ff;
            --accent: #38b6c4;
            --accent-2: #a06cd5;
            --grad: linear-gradient(120deg, #4a86ff 0%, #38b6c4 100%);
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ---- ambient background ---- */
        .bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background: radial-gradient(1200px 800px at 50% 115%, #101a35 0%, var(--bg) 60%);
        }
        .bg-grid {
            position: absolute; inset: -2px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(900px 640px at 50% 50%, #000 0%, transparent 78%);
            -webkit-mask-image: radial-gradient(900px 640px at 50% 50%, #000 0%, transparent 78%);
        }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); }
        .blob-1 { width: 560px; height: 560px; background: #2f6bff; top: -200px; right: -140px; opacity: 0.26; animation: drift 26s ease-in-out infinite alternate; }
        .blob-2 { width: 480px; height: 480px; background: #1f8f9c; bottom: -180px; left: -160px; opacity: 0.22; animation: drift 32s ease-in-out infinite alternate-reverse; }
        .blob-3 { width: 420px; height: 420px; background: #7a4fb5; top: 45%; right: 8%; opacity: 0.14; animation: drift 38s ease-in-out infinite alternate; }
        @keyframes drift {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to   { transform: translate3d(-60px, 40px, 0) scale(1.12); }
        }

        #plexus { position: fixed; inset: 0; z-index: 1; display: block; }

        /* vignette to keep the center legible */
        .vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(720px 460px at 50% 46%, rgba(7, 11, 20, 0.72) 0%, rgba(7, 11, 20, 0.28) 55%, transparent 100%);
        }

        /* ---- brand, top-left like the full page nav ---- */
        .brand {
            position: fixed; top: 0; left: 0; z-index: 4;
            height: 72px;
            display: inline-flex; align-items: center; gap: 10px;
            padding: 0 clamp(16px, 4vw, 40px);
            font-weight: 700;
            animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }
        .brand img {
            height: 30px; width: auto;
            filter: drop-shadow(0 3px 8px rgba(56, 182, 196, 0.45));
        }
        .brand span { font-family: 'Michroma', 'Inter', sans-serif; font-weight: 400; font-size: 1.05rem; letter-spacing: 0; }

        /* ---- centerpiece ---- */
        .stage {
            position: relative; z-index: 3;
            height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 0 24px;
        }

        .mark { position: relative; margin-bottom: 34px; }
        .mark img {
            display: block;
            height: clamp(78px, 13vh, 136px); width: auto;
            filter: drop-shadow(0 6px 24px rgba(56, 182, 196, 0.5));
            animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }
        .mark::before {
            content: ""; position: absolute; inset: -48px; z-index: -1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 134, 255, 0.22) 0%, rgba(56, 182, 196, 0.10) 45%, transparent 70%);
            animation: breathe 5.5s ease-in-out infinite;
        }
        /* slow orbiting halo ring */
        .mark::after {
            content: ""; position: absolute; inset: -36px; z-index: -1;
            border-radius: 50%;
            border: 1px solid transparent;
            background:
                linear-gradient(var(--bg), var(--bg)) padding-box,
                conic-gradient(from 0deg, transparent 0%, rgba(74, 134, 255, 0.55) 12%, rgba(56, 182, 196, 0.4) 22%, transparent 38%) border-box;
            -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
            opacity: 0.8;
            animation: orbit 9s linear infinite;
        }
        @keyframes orbit { to { transform: rotate(360deg); } }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.12); opacity: 1; }
        }

        /* headline, matching the full page hero */
        .headline {
            margin: 0;
            max-width: 16ch;
            font-size: clamp(2.5rem, 7vw, 4.6rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text);
            animation: rise 1.1s 0.12s cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }
        .grad {
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(22px); filter: blur(6px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* ---- contact ---- */
        .contact {
            display: inline-flex; align-items: center; gap: 10px;
            margin-top: 44px;
            padding: 13px 26px;
            border-radius: 999px;
            font-size: 0.92rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: color 0.2s ease, border-color 0.2s ease, box-shadow 0.25s ease, transform 0.15s ease;
            animation: rise 1.1s 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }
        .contact:hover {
            color: var(--text);
            border-color: rgba(56, 182, 196, 0.55);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45), 0 0 32px rgba(56, 182, 196, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .contact:active { transform: translateY(0); }
        .contact svg { width: 16px; height: 16px; stroke: var(--accent); flex: none; }
        .contact em { font-style: normal; color: var(--text); font-weight: 600; }

        .foot {
            position: fixed; left: 0; right: 0; bottom: 26px; z-index: 3;
            display: flex; justify-content: center;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            animation: rise 1.1s 0.6s cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .brand, .mark img, .mark::before, .mark::after, .headline, .contact, .foot { animation: none !important; }
        }
    </style>
</head>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        /* ---- molecular constellation background ---- */
        (function () {
            const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const canvas = document.getElementById('plexus');
            const ctx = canvas.getContext('2d');
            let w, h, dpr, nodes = [];
            const LINK = 150;                     // max px between linked nodes
            const mouse = { x: -1e4, y: -1e4 };

            const PALETTE = ['74, 134, 255', '56, 182, 196', '160, 108, 213'];

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                w = window.innerWidth; h = window.innerHeight;
                canvas.width = w * dpr; canvas.height = h * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const target = Math.min(150, Math.round((w * h) / 11000));
                while (nodes.length < target) nodes.push(makeNode());
                nodes.length = target;
            }

            function makeNode() {
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.28,
                    vy: (Math.random() - 0.5) * 0.28,
                    r: 1 + Math.random() * 1.8,
                    c: PALETTE[(Math.random() * PALETTE.length) | 0],
                    tw: Math.random() * Math.PI * 2,   // twinkle phase
                };
            }

            function frame(t) {
                draw(t);
                requestAnimationFrame(frame);
            }

            function draw(t) {
                ctx.clearRect(0, 0, w, h);

                for (const n of nodes) {
                    n.x += n.vx; n.y += n.vy;
                    // gentle pull toward the pointer, capped so nodes drift, not chase
                    const mdx = mouse.x - n.x, mdy = mouse.y - n.y;
                    const md2 = mdx * mdx + mdy * mdy;
                    if (md2 < 200 * 200) { n.x += mdx * 0.0012; n.y += mdy * 0.0012; }
                    if (n.x < -20) n.x = w + 20; else if (n.x > w + 20) n.x = -20;
                    if (n.y < -20) n.y = h + 20; else if (n.y > h + 20) n.y = -20;
                }

                // bonds
                ctx.lineWidth = 1;
                for (let i = 0; i < nodes.length; i++) {
                    const a = nodes[i];
                    for (let j = i + 1; j < nodes.length; j++) {
                        const b = nodes[j];
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const d2 = dx * dx + dy * dy;
                        if (d2 > LINK * LINK) continue;
                        const alpha = (1 - Math.sqrt(d2) / LINK) * 0.42;
                        ctx.strokeStyle = 'rgba(' + a.c + ',' + alpha.toFixed(3) + ')';
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                }

                // atoms
                for (const n of nodes) {
                    const glow = 0.55 + 0.45 * Math.sin(t * 0.0012 + n.tw);
                    ctx.fillStyle = 'rgba(' + n.c + ',' + (0.5 + 0.4 * glow).toFixed(3) + ')';
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r * (0.85 + 0.3 * glow), 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            window.addEventListener('resize', resize);
            window.addEventListener('pointermove', function (e) { mouse.x = e.clientX; mouse.y = e.clientY; });
            window.addEventListener('pointerleave', function () { mouse.x = -1e4; mouse.y = -1e4; });

            resize();
            if (reduced) {
                draw(0); // a single static constellation
            } else {
                requestAnimationFrame(frame);
            }
        })();
    </script>
</body>
</html>
